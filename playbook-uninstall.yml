---
- name: Claude Coding Bot Uninstall
  hosts: raspberry_pi
  become: true

  vars:
    bot_user: "{{ ansible_user }}"
    bot_home: "/home/{{ ansible_user }}/my-claude-code"
    claude_home: "/home/{{ ansible_user }}/.claude"
    repo_dir: "{{ bot_home }}/iac-toolbox-cli"
    env_file: "{{ bot_home }}/.claude-env"
    service_name: claude-coding-bot

  tasks:
    - name: Stop and disable service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove systemd unit file
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ service_name }}.service"
        state: absent
      notify: Reload systemd

    - name: Remove env file
      ansible.builtin.file:
        path: "{{ env_file }}"
        state: absent

    - name: Remove Claude onboarding config
      ansible.builtin.file:
        path: "{{ claude_home }}/../.claude.json"
        state: absent

    - name: Remove scripts directory
      ansible.builtin.file:
        path: "{{ bot_home }}/scripts"
        state: absent

    - name: Remove global agents
      ansible.builtin.file:
        path: "{{ claude_home }}/agents/{{ item }}"
        state: absent
      loop:
        - feature-writer.md
        - feature-reviewer.md

    - name: Remove global skills
      ansible.builtin.file:
        path: "{{ claude_home }}/skills/{{ item }}"
        state: absent
      loop:
        - implementation-orchestrator
        - init

    - name: Remove CLAUDE.md from repo
      ansible.builtin.file:
        path: "{{ repo_dir }}/CLAUDE.md"
        state: absent

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
