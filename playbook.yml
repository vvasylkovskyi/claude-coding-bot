---
- name: Claude Coding Bot Setup
  hosts: raspberry_pi
  become: true

  vars_files:
    - common.yml

  vars:
    bot_user: "{{ ansible_user }}"
    bot_home: "/home/{{ ansible_user }}/my-claude-code"
    claude_home: "/home/{{ ansible_user }}/.claude"
    feature_docs_dir: "{{ bot_home }}/context/feature-docs"
    repo_dir: "{{ bot_home }}/{{ service_name }}"
    env_file: "{{ bot_home }}/.claude-env"

  tasks:
    - name: Install inotify-tools
      ansible.builtin.apt:
        name: inotify-tools
        state: present
        update_cache: true

    - name: Find claude binary location
      ansible.builtin.shell:
        cmd: set -o pipefail; find /usr/local/bin /home/{{ bot_user }}/.local/bin /home/{{ bot_user }}/.npm-global/bin -name claude 2>/dev/null | head -1
        executable: /bin/bash
      become: true
      become_user: "{{ bot_user }}"
      register: claude_bin
      changed_when: false

    - name: Download Claude Code install script
      ansible.builtin.get_url:
        url: https://claude.ai/install.sh
        dest: /tmp/claude-install.sh
        mode: "0755"
      when: claude_bin.stdout == ""

    - name: Install Claude Code
      ansible.builtin.command:
        cmd: bash /tmp/claude-install.sh
      become: true
      become_user: "{{ bot_user }}"
      when: claude_bin.stdout == ""
      changed_when: true

    - name: Create required directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ bot_user }}"
        mode: "0755"
      loop:
        - "{{ feature_docs_dir }}"
        - "{{ repo_dir }}"
        - "{{ bot_home }}/scripts"
        - "{{ claude_home }}/agents"
        - "{{ claude_home }}/skills/implementation-orchestrator"
        - "{{ claude_home }}/skills/init"

    - name: Write Claude env file
      ansible.builtin.copy:
        dest: "{{ env_file }}"
        owner: "{{ bot_user }}"
        mode: "0600"
        content: |
          CLAUDE_CODE_OAUTH_TOKEN={{ claude_token }}

    - name: Write Claude onboarding config
      ansible.builtin.copy:
        dest: "{{ claude_home }}/../.claude.json"
        owner: "{{ bot_user }}"
        mode: "0600"
        content: |
          { "hasCompletedOnboarding": true }

    - name: Deploy agents
      ansible.builtin.copy:
        src: "agents/{{ item }}"
        dest: "{{ claude_home }}/agents/{{ item }}"
        owner: "{{ bot_user }}"
        mode: "0644"
      loop:
        - feature-writer.md
        - feature-reviewer.md

    - name: Deploy orchestrator skill
      ansible.builtin.copy:
        src: skills/implementation-orchestrator/SKILL.md
        dest: "{{ claude_home }}/skills/implementation-orchestrator/SKILL.md"
        owner: "{{ bot_user }}"
        mode: "0644"

    - name: Deploy init skill
      ansible.builtin.copy:
        src: skills/init/SKILL.md
        dest: "{{ claude_home }}/skills/init/SKILL.md"
        owner: "{{ bot_user }}"
        mode: "0644"

    - name: Deploy start.sh
      ansible.builtin.copy:
        src: scripts/start.sh
        dest: "{{ bot_home }}/scripts/start.sh"
        owner: "{{ bot_user }}"
        mode: "0755"
      notify: Restart service

    - name: Deploy systemd service from template
      ansible.builtin.template:
        src: "templates/{{ service_name }}.service.j2"
        dest: "/etc/systemd/system/{{ service_name }}.service"
        mode: "0644"
      notify: Restart service

    - name: Enable and start service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        enabled: true
        state: started
        daemon_reload: true

    - name: Find claude binary location
      ansible.builtin.shell:
        cmd: set -o pipefail; find /usr/local/bin /home/{{ bot_user }}/.local/bin /home/{{ bot_user }}/.npm-global/bin -name claude 2>/dev/null | head -1
        executable: /bin/bash
      become: true
      become_user: "{{ bot_user }}"
      register: claude_bin
      changed_when: false

    - name: Smoke test — verify Claude Code is responsive
      ansible.builtin.shell:
        cmd: "{{ claude_bin.stdout }} --dangerously-skip-permissions -p 'Reply with OK'"
        executable: /bin/bash
      become: true
      become_user: "{{ bot_user }}"
      environment:
        CLAUDE_CODE_OAUTH_TOKEN: "{{ claude_token }}"
      register: smoke_result
      changed_when: false
      failed_when: smoke_result.rc != 0 or claude_bin.stdout == ""

    - name: Run init skill to bootstrap CLAUDE.md
      ansible.builtin.shell:
        cmd: "{{ claude_bin.stdout }} --dangerously-skip-permissions -p '/init Bootstrap this repository'"
        chdir: "{{ repo_dir }}"
        executable: /bin/bash
      become: true
      become_user: "{{ bot_user }}"
      environment:
        CLAUDE_CODE_OAUTH_TOKEN: "{{ claude_token }}"
      changed_when: true
      when: smoke_result.rc == 0 or claude_bin.stdout != ""

  handlers:
    - name: Restart service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: restarted
        daemon_reload: true
